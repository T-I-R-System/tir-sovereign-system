openapi: 3.0.0
info:
  title: .T.I.R.® Sovereign System Public API
  description: High-level public interfaces for partners and integrations.
  version: 1.0.0
  contact:
    name: .T.I.R.® Sovereign Systems
    url: https://github.com/.T.I.R.-Sovereign/tir-sovereign-system

servers:
  - url: https://api.tir-sovereign.systems/v1

paths:
  /status:
    get:
      summary: System Status
      description: Returns high-level pillar synchronization status.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  pillars_synced: { type: integer }

  /partner/booking:
    post:
      summary: Booking Request (Partner Integration)
      description: Submit booking requests for urban mobility services.
      security: []  # Public endpoint with rate limiting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                origin: { type: string }
                destination: { type: string }
                passengers: { type: integer }
      responses:
        '200':
          description: Booking accepted
